controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - arm1_joint
      - arm2_point
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

    # PHẦN QUAN TRỌNG NHẤT: PID GAINS
    # Vì robot của bạn scale 10 (khổng lồ), thông số P phải rất lớn
    gains:
      arm1_joint: {p: 1000000.0, i: 100.0, d: 5000.0} # P = 1 triệu
      arm2_point: {p: 5000000.0, i: 100.0, d: 10000.0} # P = 5 triệu

    # THÊM RÀNG BUỘC ĐỂ CONTROLLER KHÔNG BỎ QUA LỆNH
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      arm1_joint: { trajectory: 0.1, goal: 0.02 }
      arm2_point: { trajectory: 0.1, goal: 0.02 }
